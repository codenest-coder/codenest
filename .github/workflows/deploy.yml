name: Build & Deploy (cPanel Node App)

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Build the Vite frontend into server/public
      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      # Passenger restart trigger (content doesn't matter, timestamp does)
      - name: Create restart trigger
        run: |
          mkdir -p server/tmp
          echo "restart $(date -u)" > server/tmp/restart.txt

      # Deploy the Node app folder (server/) into your cPanel Node app directory
      - name: Deploy to cPanel (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./server/
          server-dir: /codenest/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/*.log
            **/.env